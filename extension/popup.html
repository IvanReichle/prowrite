<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProWrite</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">ProWrite</span>
      </div>
      <div class="usage-badge" id="usageBadge">
        <span id="usageText">Cargando…</span>
      </div>
    </header>

    <!-- Input -->
    <section class="section">
      <label class="label" for="inputText">Texto a mejorar</label>
      <textarea
        id="inputText"
        class="textarea"
        placeholder="Pega aquí el texto que quieres mejorar…"
        rows="5"
      ></textarea>
    </section>

    <!-- Tone selector -->
    <section class="section">
      <label class="label">Tono</label>
      <div class="tone-grid">
        <button class="tone-btn active" data-tone="Formal">Formal</button>
        <button class="tone-btn" data-tone="Directo">Directo</button>
        <button class="tone-btn" data-tone="Persuasivo">Persuasivo</button>
        <button class="tone-btn" data-tone="Amigable">Amigable</button>
      </div>
    </section>

    <!-- Action button -->
    <button id="improveBtn" class="btn-primary">
      <span id="btnText">✦ Mejorar texto</span>
      <span id="btnLoader" class="loader hidden"></span>
    </button>

    <!-- Output -->
    <section class="section" id="outputSection" style="display:none">
      <div class="output-header">
        <label class="label">Resultado</label>
        <button id="copyBtn" class="btn-copy">Copiar</button>
      </div>
      <div id="outputText" class="output-box"></div>
    </section>

    <!-- Error -->
    <div id="errorMsg" class="error hidden"></div>

    <!-- Pro banner -->
    <div class="pro-banner" id="proBanner" style="display:none">
      <p class="pro-text">🔒 Has alcanzado el límite gratuito (10/día)</p>
      <button id="proBtn" class="btn-pro">⚡ Hazte Pro — Ilimitado</button>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
